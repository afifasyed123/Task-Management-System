<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Task Manager</h2>

        <a href="/tasks/new" class="btn btn-primary">
            + Add Task
        </a>
    </div>
    <form th:action="@{/tasks/search}" method="get" class="d-flex mb-3">

        <input
                type="text"
                name="keyword"
                class="form-control me-2"
                placeholder="Search by title">

        <button class="btn btn-primary">
            Search
        </button>

    </form>
    <table class="table table-bordered table-hover shadow bg-white">

        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Due Date</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="task : ${tasks}">

            <td th:text="${task.title}"></td>
            <td th:text="${task.description}"></td>
            <td th:text="${task.dueDate}"></td>

            <td>
    <span th:if="${task.priority.name() == 'LOW'}"
          class="badge bg-success">
        LOW
    </span>

                <span th:if="${task.priority.name() == 'MEDIUM'}"
                      class="badge bg-warning text-dark">
        MEDIUM
    </span>

                <span th:if="${task.priority.name() == 'HIGH'}"
                      class="badge bg-danger">
        HIGH
    </span>
            </td>

            <td>

    <span th:if="${task.status.name() == 'TODO'}"
          class="badge bg-secondary">
        TODO
    </span>

                <span th:if="${task.status.name() == 'IN_PROGRESS'}"
                      class="badge bg-primary">
        IN PROGRESS
    </span>

                <span th:if="${task.status.name() == 'DONE'}"
                      class="badge bg-success">
        DONE
    </span>

            </td>

            <td>
                <a class="btn btn-sm btn-primary"
                   th:href="@{/tasks/edit/{id}(id=${task.id})}">
                    Edit
                </a>
            </td>

            <td>
                <a class="btn btn-sm btn-danger"
                   onclick="return confirm('Delete this task?')"
                   th:href="@{/tasks/delete/{id}(id=${task.id})}">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
